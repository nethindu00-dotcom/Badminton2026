name: Deploy registration forms

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build output folder with the real Worker URL injected
        run: |
          mkdir -p dist
          cp team_registration.html individual_registration.html dist/
          sed -i "s|__WORKER_URL__|${{ secrets.WORKER_URL }}|g" dist/team_registration.html
          sed -i "s|__WORKER_URL__|${{ secrets.WORKER_URL }}|g" dist/individual_registration.html

      - name: Verify substitution actually worked
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          echo "WORKER_URL secret length: ${#WORKER_URL} characters"
          if [ "${#WORKER_URL}" -eq 0 ]; then
            echo "❌ The WORKER_URL secret is EMPTY. Add it under Settings → Secrets and variables → Actions → Secrets tab."
            exit 1
          fi
          if grep -q "__WORKER_URL__" dist/team_registration.html; then
            echo "❌ Placeholder still present in team_registration.html after substitution."
            exit 1
          fi
          if grep -q "__WORKER_URL__" dist/individual_registration.html; then
            echo "❌ Placeholder still present in individual_registration.html after substitution."
            exit 1
          fi
          echo "✅ Substitution succeeded in both files."

      - name: Upload build as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
