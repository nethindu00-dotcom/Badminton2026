name: Deploy registration forms

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build output folder with the real Worker URL injected
        run: |
          mkdir -p dist
          cp team_registration.html individual_registration.html dist/
          sed -i "s|__WORKER_URL__|${{ secrets.WORKER_URL }}|g" dist/team_registration.html
          sed -i "s|__WORKER_URL__|${{ secrets.WORKER_URL }}|g" dist/individual_registration.html

      - name: Upload build as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
